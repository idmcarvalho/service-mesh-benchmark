---
- name: Setup Istio Service Mesh
  hosts: master
  become: yes
  vars:
    istio_version: "1.28.3"
    istio_arch: "arm64"

  tasks:
    - name: Download Istio
      shell: |
        curl -L https://istio.io/downloadIstio | ISTIO_VERSION={{ istio_version }} TARGET_ARCH={{ istio_arch }} sh -
      args:
        chdir: /tmp

    - name: Copy istioctl to /usr/local/bin
      copy:
        src: "/tmp/istio-{{ istio_version }}/bin/istioctl"
        dest: "/usr/local/bin/istioctl"
        mode: '0755'
        remote_src: yes

    - name: Check if Istio is already installed
      shell: kubectl get namespace istio-system
      register: istio_namespace
      ignore_errors: yes
      become_user: ubuntu

    - name: Install Istio with ambient profile
      shell: |
        /usr/local/bin/istioctl install --set profile=ambient -y
      when: istio_namespace.rc != 0
      become_user: ubuntu
      environment:
        KUBECONFIG: "/home/ubuntu/.kube/config"

    - name: Enable automatic sidecar injection for benchmark namespaces
      shell: |
        kubectl label namespace http-benchmark istio-injection=enabled --overwrite || true
        kubectl label namespace grpc-benchmark istio-injection=enabled --overwrite || true
        kubectl label namespace websocket-benchmark istio-injection=enabled --overwrite || true
        kubectl label namespace db-benchmark istio-injection=enabled --overwrite || true
      become_user: ubuntu
      environment:
        KUBECONFIG: "/home/ubuntu/.kube/config"
      ignore_errors: yes

    - name: Label ambient namespace
      shell: |
        kubectl label namespace istio-ambient istio.io/dataplane-mode=ambient --overwrite || true
        kubectl label namespace istio-ambient istio-injection=disabled --overwrite || true
      become_user: ubuntu
      environment:
        KUBECONFIG: "/home/ubuntu/.kube/config"
      ignore_errors: yes

    - name: Wait for Istio components to be ready
      shell: kubectl wait --for=condition=available --timeout=300s deployment --all -n istio-system
      become_user: ubuntu
      environment:
        KUBECONFIG: "/home/ubuntu/.kube/config"

    - name: Wait for ztunnel DaemonSet to be ready
      shell: kubectl rollout status daemonset/ztunnel -n istio-system --timeout=300s
      become_user: ubuntu
      environment:
        KUBECONFIG: "/home/ubuntu/.kube/config"

    - name: Wait for istio-cni-node DaemonSet to be ready
      shell: kubectl rollout status daemonset/istio-cni-node -n istio-system --timeout=300s
      become_user: ubuntu
      environment:
        KUBECONFIG: "/home/ubuntu/.kube/config"

    - name: Display Istio installation status
      shell: /usr/local/bin/istioctl version
      become_user: ubuntu
      environment:
        KUBECONFIG: "/home/ubuntu/.kube/config"
      register: istio_version_output

    - name: Show Istio version
      debug:
        msg: "{{ istio_version_output.stdout }}"

    - name: Show Istio system pods
      shell: kubectl get pods -n istio-system
      become_user: ubuntu
      environment:
        KUBECONFIG: "/home/ubuntu/.kube/config"
      register: istio_pods

    - name: Display Istio pods
      debug:
        msg: "{{ istio_pods.stdout }}"
