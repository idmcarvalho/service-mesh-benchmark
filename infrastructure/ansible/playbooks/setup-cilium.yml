---
- name: Setup Cilium Service Mesh
  hosts: master
  become: yes
  vars:
    cilium_version: "1.19.0"
    cilium_cli_arch: "arm64"

  tasks:
    - name: Download latest Cilium CLI
      shell: |
        CILIUM_CLI_VERSION=$(curl -s https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt)
        curl -L "https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-linux-{{ cilium_cli_arch }}.tar.gz" -o /tmp/cilium-cli.tar.gz

    - name: Extract Cilium CLI
      unarchive:
        src: "/tmp/cilium-cli.tar.gz"
        dest: "/usr/local/bin/"
        remote_src: yes

    - name: Make Cilium CLI executable
      file:
        path: "/usr/local/bin/cilium"
        mode: '0755'

    - name: Check if Cilium is already installed
      shell: kubectl get namespace kube-system
      register: cilium_namespace
      become_user: ubuntu
      environment:
        KUBECONFIG: "/home/ubuntu/.kube/config"

    - name: Check existing Cilium installation
      shell: cilium status
      register: cilium_status
      become_user: ubuntu
      environment:
        KUBECONFIG: "/home/ubuntu/.kube/config"
      ignore_errors: yes

    - name: Install Gateway API CRDs
      shell: |
        kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.2.1/config/crd/standard/gateway.networking.k8s.io_gatewayclasses.yaml
        kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.2.1/config/crd/standard/gateway.networking.k8s.io_gateways.yaml
        kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.2.1/config/crd/standard/gateway.networking.k8s.io_httproutes.yaml
        kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.2.1/config/crd/standard/gateway.networking.k8s.io_referencegrants.yaml
        kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.2.1/config/crd/experimental/gateway.networking.k8s.io_grpcroutes.yaml
        kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.2.1/config/crd/experimental/gateway.networking.k8s.io_tlsroutes.yaml
      become_user: ubuntu
      environment:
        KUBECONFIG: "/home/ubuntu/.kube/config"

    - name: Install Cilium with advanced eBPF features and Gateway API
      shell: |
        cilium install --version {{ cilium_version }} \
          --set kubeProxyReplacement=true \
          --set routingMode=tunnel \
          --set tunnelProtocol=vxlan \
          --set ipam.mode=cluster-pool \
          --set gatewayAPI.enabled=true \
          --set ingressController.enabled=true \
          --set ingressController.loadbalancerMode=shared \
          --set envoyConfig.enabled=true \
          --set cni.exclusive=false \
          --set hubble.enabled=true \
          --set hubble.relay.enabled=true \
          --set hubble.ui.enabled=true \
          --set hubble.metrics.enabled="{dns,drop,tcp,flow,icmp,http}" \
          --set prometheus.enabled=true \
          --set operator.prometheus.enabled=true \
          --set bpf.monitorAggregation=maximum
      when: cilium_status.rc != 0
      become_user: ubuntu
      environment:
        KUBECONFIG: "/home/ubuntu/.kube/config"

    - name: Install Hubble CLI
      shell: |
        HUBBLE_VERSION=$(curl -s https://raw.githubusercontent.com/cilium/hubble/master/stable.txt)
        curl -L --remote-name-all https://github.com/cilium/hubble/releases/download/$HUBBLE_VERSION/hubble-linux-{{ cilium_cli_arch }}.tar.gz{,.sha256sum}
        sha256sum --check hubble-linux-{{ cilium_cli_arch }}.tar.gz.sha256sum
        tar xzvf hubble-linux-{{ cilium_cli_arch }}.tar.gz
        mv hubble /usr/local/bin/
        rm hubble-linux-{{ cilium_cli_arch }}.tar.gz{,.sha256sum}
      args:
        creates: /usr/local/bin/hubble

    - name: Wait for Cilium to be ready
      shell: cilium status --wait
      become_user: ubuntu
      environment:
        KUBECONFIG: "/home/ubuntu/.kube/config"
      retries: 10
      delay: 30

    - name: Enable Hubble UI port forwarding (background)
      shell: |
        nohup kubectl port-forward -n kube-system svc/hubble-ui 8080:80 --address 0.0.0.0 &
      become_user: ubuntu
      environment:
        KUBECONFIG: "/home/ubuntu/.kube/config"
      ignore_errors: yes

    - name: Run Cilium connectivity test
      shell: cilium connectivity test --test '!no-unexpected-packet-drops,!no-policies-extra'
      become_user: ubuntu
      environment:
        KUBECONFIG: "/home/ubuntu/.kube/config"
      ignore_errors: yes
      async: 600
      poll: 0

    - name: Display Cilium status
      shell: cilium status
      become_user: ubuntu
      environment:
        KUBECONFIG: "/home/ubuntu/.kube/config"
      register: cilium_status_output

    - name: Show Cilium status
      debug:
        msg: "{{ cilium_status_output.stdout }}"

    - name: Get Cilium version
      shell: cilium version
      become_user: ubuntu
      environment:
        KUBECONFIG: "/home/ubuntu/.kube/config"
      register: cilium_version_output

    - name: Show Cilium version
      debug:
        msg: "{{ cilium_version_output.stdout }}"
