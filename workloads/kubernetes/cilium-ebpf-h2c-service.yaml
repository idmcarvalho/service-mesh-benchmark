# Cilium eBPF L4-Only HTTP/2 (h2c) Service for 4-Way Benchmark
# This workload runs through Cilium's eBPF datapath at L3/L4 (no L7 proxy)
# Traffic path: client -> eBPF -> ClusterIP -> eBPF -> backend (kernel-level, no userspace proxy)
# NOTE: Cilium L3/L4 is transparent to HTTP version — h2c frames pass through unchanged
---
apiVersion: v1
kind: Namespace
metadata:
  name: cilium-h2c
  labels:
    benchmark: h2c
    workload-type: http2
    istio-injection: disabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-server
  namespace: cilium-h2c
  labels:
    app: http-server
    version: v1
    benchmark: cilium-ebpf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-server
  template:
    metadata:
      labels:
        app: http-server
        version: v1
        benchmark: cilium-ebpf
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      nodeSelector:
        benchmark-role: server
      containers:
      - name: fortio
        image: fortio/fortio:latest
        args: ["server", "-http-port", "8080"]
        ports:
        - containerPort: 8080
          name: h2c
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /fortio/
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /fortio/
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: http-server
  namespace: cilium-h2c
  labels:
    app: http-server
    benchmark: cilium-ebpf
spec:
  type: ClusterIP
  selector:
    app: http-server
  ports:
  - name: h2c
    port: 8080
    targetPort: 8080
    protocol: TCP
    appProtocol: h2c
