# Baseline HTTP/2 (h2c) Service for 4-Way Benchmark
# This workload runs WITHOUT any service mesh to establish HTTP/2 performance baselines
# Uses Fortio server which supports h2c (cleartext HTTP/2) natively
---
apiVersion: v1
kind: Namespace
metadata:
  name: baseline-h2c
  labels:
    benchmark: h2c
    workload-type: http2
    istio-injection: disabled
    linkerd.io/inject: disabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-server
  namespace: baseline-h2c
  labels:
    app: http-server
    version: v1
    benchmark: h2c
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-server
  template:
    metadata:
      labels:
        app: http-server
        version: v1
        benchmark: h2c
      annotations:
        sidecar.istio.io/inject: "false"
        linkerd.io/inject: disabled
    spec:
      nodeSelector:
        benchmark-role: server
      containers:
      - name: fortio
        image: fortio/fortio:latest
        args: ["server", "-http-port", "8080"]
        ports:
        - containerPort: 8080
          name: h2c
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /fortio/
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /fortio/
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: http-server
  namespace: baseline-h2c
  labels:
    app: http-server
    benchmark: h2c
spec:
  type: ClusterIP
  selector:
    app: http-server
  ports:
  - name: h2c
    port: 8080
    targetPort: 8080
    protocol: TCP
    appProtocol: h2c
