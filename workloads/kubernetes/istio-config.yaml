# Istio configuration for benchmark workloads
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: echo-server-dr
  namespace: benchmark
spec:
  host: echo-server
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: DO_NOT_UPGRADE
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
    loadBalancer:
      simple: ROUND_ROBIN
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: echo-server-vs
  namespace: benchmark
spec:
  hosts:
  - echo-server
  http:
  - route:
    - destination:
        host: echo-server
        port:
          number: 80
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: connect-failure,refused-stream,unavailable,cancelled,retriable-status-codes
---
# PeerAuthentication for mTLS
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: benchmark-mtls
  namespace: benchmark
spec:
  mtls:
    mode: PERMISSIVE
---
# AuthorizationPolicy
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: echo-server-authz
  namespace: benchmark
spec:
  selector:
    matchLabels:
      app: echo-server
  action: ALLOW
  rules:
  - from:
    - source:
        namespaces: ["benchmark"]
    to:
    - operation:
        methods: ["GET", "POST"]
        ports: ["80"]
