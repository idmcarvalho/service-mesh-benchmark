# Istio Ambient Mode gRPC Service for 4-Way Benchmark
# This workload runs under Istio Ambient Mode (ztunnel L4, no sidecar)
# Traffic path: client [ztunnel] -> service:8079 -> [ztunnel] backend fortio server
# ztunnel handles mTLS at L4; gRPC frames pass through to the application unchanged
---
apiVersion: v1
kind: Namespace
metadata:
  name: istio-ambient-grpc
  labels:
    benchmark: ambient
    workload-type: grpc
    istio.io/dataplane-mode: ambient
    istio-injection: disabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-server
  namespace: istio-ambient-grpc
  labels:
    app: http-server
    version: v1
    benchmark: ambient
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-server
  template:
    metadata:
      labels:
        app: http-server
        version: v1
        benchmark: ambient
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      nodeSelector:
        benchmark-role: server
      containers:
      - name: fortio
        image: fortio/fortio:latest
        args: ["server", "-grpc-port", "8079", "-http-port", "8080"]
        ports:
        - containerPort: 8079
          name: grpc
          protocol: TCP
        - containerPort: 8080
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /fortio/
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /fortio/
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: http-server
  namespace: istio-ambient-grpc
  labels:
    app: http-server
    benchmark: ambient
spec:
  type: ClusterIP
  selector:
    app: http-server
  ports:
  - name: grpc
    port: 8079
    targetPort: 8079
    protocol: TCP
    appProtocol: grpc
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
