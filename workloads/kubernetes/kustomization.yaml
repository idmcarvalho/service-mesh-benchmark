apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: service-mesh-benchmark
  annotations:
    config.kubernetes.io/local-config: "true"

namespace: benchmark

commonLabels:
  app.kubernetes.io/part-of: service-mesh-benchmark
  app.kubernetes.io/managed-by: kustomize

resources:
- namespace.yaml
- echo-server.yaml
- fortio-server.yaml
- load-generator.yaml

# Optional: Network policies (apply separately for testing)
# - network-policies.yaml

configMapGenerator:
- name: benchmark-config
  literals:
  - BENCHMARK_DURATION=60
  - BENCHMARK_CONNECTIONS=100
  - BENCHMARK_THREADS=4
  - MESH_TYPE=cilium
