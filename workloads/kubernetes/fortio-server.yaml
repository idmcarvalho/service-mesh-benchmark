# Fortio - Multi-protocol load testing server
# Supports HTTP, gRPC, and TCP benchmarks
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fortio-server
  namespace: benchmark
  labels:
    app: fortio-server
    app.kubernetes.io/name: fortio-server
    app.kubernetes.io/component: workload
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fortio-server
  template:
    metadata:
      labels:
        app: fortio-server
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
      - name: fortio
        image: fortio/fortio:latest
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8079
          name: grpc
        - containerPort: 8078
          name: redirect
        args:
        - server
        - -http-port
        - "8080"
        - -grpc-port
        - "8079"
        - -redirect-port
        - "8078"
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 64Mi
        livenessProbe:
          httpGet:
            path: /fortio/
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /fortio/
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: fortio-server
  namespace: benchmark
  labels:
    app: fortio-server
spec:
  selector:
    app: fortio-server
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  - port: 8079
    targetPort: 8079
    name: grpc
  type: ClusterIP
---
# Fortio load generator for comprehensive benchmarks
apiVersion: batch/v1
kind: Job
metadata:
  name: fortio-benchmark
  namespace: benchmark
  labels:
    app: fortio-benchmark
spec:
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: fortio-benchmark
        type: benchmark
    spec:
      restartPolicy: Never
      containers:
      - name: fortio
        image: fortio/fortio:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "=== HTTP Benchmark ==="
          fortio load -c 50 -qps 0 -t 60s -json /tmp/http-results.json \
            http://fortio-server.benchmark.svc.cluster.local:8080/echo

          echo ""
          echo "=== gRPC Benchmark ==="
          fortio load -c 50 -qps 0 -t 60s -grpc -json /tmp/grpc-results.json \
            fortio-server.benchmark.svc.cluster.local:8079

          echo ""
          echo "=== Results Summary ==="
          cat /tmp/http-results.json | grep -E '"(DurationHistogram|ActualQPS|NumThreads)"'
          cat /tmp/grpc-results.json | grep -E '"(DurationHistogram|ActualQPS|NumThreads)"'
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 64Mi
