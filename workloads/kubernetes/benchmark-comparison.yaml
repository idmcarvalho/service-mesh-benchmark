---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-server
  namespace: benchmark-istio
  labels:
    app: echo-server
    benchmark: comparison
    mesh-type: istio-sidecar
spec:
  replicas: 3
  selector:
    matchLabels:
      app: echo-server
  template:
    metadata:
      labels:
        app: echo-server
        benchmark: comparison
        mesh-type: istio-sidecar
      annotations:
        sidecar.istio.io/inject: "true"
        proxy.istio.io/config: |
          holdApplicationUntilProxyStarts: true
    spec:
      containers:
      - name: echo-server
        image: python:3.11-slim
        command: ["python3", "/app/server.py"]
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        - name: MESH_TYPE
          value: "istio-sidecar"
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        volumeMounts:
        - name: server-code
          mountPath: /app
      volumes:
      - name: server-code
        configMap:
          name: echo-server-config
          defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: echo-server
  namespace: benchmark-istio
  labels:
    app: echo-server
    benchmark: comparison
spec:
  type: ClusterIP
  selector:
    app: echo-server
  ports:
  - name: http
    port: 80
    targetPort: 8080
---
# Istio DestinationRule for connection pooling
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: echo-server
  namespace: benchmark-istio
spec:
  host: echo-server.benchmark-istio.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 10s
      http:
        h2UpgradePolicy: UPGRADE
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
---
