# Service Mesh Benchmark Comparison: Baseline vs Istio Sidecar vs Cilium eBPF
# This manifest creates identical workloads across three configurations
---
# ============================================================================
# NAMESPACE 1: BASELINE (No Service Mesh)
# ============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: benchmark-baseline
  labels:
    benchmark: comparison
    mesh-type: none
    istio-injection: disabled
    linkerd.io/inject: disabled
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: echo-server-config
  namespace: benchmark-baseline
data:
  server.py: |
    #!/usr/bin/env python3
    """High-performance HTTP echo server for benchmarking."""
    import json
    import os
    import time
    import socket
    from http.server import HTTPServer, BaseHTTPRequestHandler
    from datetime import datetime

    class BenchmarkHandler(BaseHTTPRequestHandler):
        def do_GET(self):
            start = time.perf_counter_ns()
            response = {
                'path': self.path,
                'hostname': os.environ.get('HOSTNAME', 'unknown'),
                'timestamp': datetime.utcnow().isoformat(),
                'mesh_type': os.environ.get('MESH_TYPE', 'unknown'),
                'processing_start_ns': start
            }
            body = json.dumps(response).encode()
            self.send_response(200)
            self.send_header('Content-Type', 'application/json')
            self.send_header('Content-Length', len(body))
            self.send_header('X-Processing-Time-Ns', str(time.perf_counter_ns() - start))
            self.end_headers()
            self.wfile.write(body)

        def do_POST(self):
            start = time.perf_counter_ns()
            content_length = int(self.headers.get('Content-Length', 0))
            body = self.rfile.read(content_length) if content_length else b''
            response = {
                'path': self.path,
                'hostname': os.environ.get('HOSTNAME', 'unknown'),
                'timestamp': datetime.utcnow().isoformat(),
                'mesh_type': os.environ.get('MESH_TYPE', 'unknown'),
                'body_size': len(body),
                'processing_start_ns': start
            }
            resp_body = json.dumps(response).encode()
            self.send_response(200)
            self.send_header('Content-Type', 'application/json')
            self.send_header('Content-Length', len(resp_body))
            self.send_header('X-Processing-Time-Ns', str(time.perf_counter_ns() - start))
            self.end_headers()
            self.wfile.write(resp_body)

        def log_message(self, format, *args):
            pass  # Suppress logging for performance

    def main():
        port = int(os.environ.get('PORT', '8080'))
        server = HTTPServer(('0.0.0.0', port), BenchmarkHandler)
        server.socket.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
        print(f'Benchmark server starting on port {port}')
        server.serve_forever()

    if __name__ == '__main__':
        main()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-server
  namespace: benchmark-baseline
  labels:
    app: echo-server
    benchmark: comparison
    mesh-type: none
spec:
  replicas: 3
  selector:
    matchLabels:
      app: echo-server
  template:
    metadata:
      labels:
        app: echo-server
        benchmark: comparison
        mesh-type: none
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
      - name: echo-server
        image: python:3.11-slim
        command: ["python3", "/app/server.py"]
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        - name: MESH_TYPE
          value: "baseline"
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: server-code
          mountPath: /app
      volumes:
      - name: server-code
        configMap:
          name: echo-server-config
          defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: echo-server
  namespace: benchmark-baseline
  labels:
    app: echo-server
    benchmark: comparison
spec:
  type: ClusterIP
  selector:
    app: echo-server
  ports:
  - name: http
    port: 80
    targetPort: 8080
---
# ============================================================================
