# gRPC Service for 4-Way Benchmark (Istio Sidecar Mode)
# This workload runs WITH Istio sidecar injection enabled
# Uses Fortio's built-in gRPC server/client (consistent toolchain with HTTP benchmarks)
# Traffic path: client [sidecar] -> service:8079 -> [sidecar] backend fortio server
---
apiVersion: v1
kind: Namespace
metadata:
  name: grpc-benchmark
  labels:
    benchmark: mesh
    workload-type: grpc
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-server
  namespace: grpc-benchmark
  labels:
    app: http-server
    version: v1
    benchmark: mesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-server
  template:
    metadata:
      labels:
        app: http-server
        version: v1
        benchmark: mesh
      annotations:
        sidecar.istio.io/inject: "true"
        proxy.istio.io/config: |
          holdApplicationUntilProxyStarts: true
    spec:
      nodeSelector:
        benchmark-role: server
      containers:
      - name: fortio
        image: fortio/fortio:latest
        # Fortio serves both gRPC (8079) and HTTP (8080) from a single process
        args: ["server", "-grpc-port", "8079", "-http-port", "8080"]
        ports:
        - containerPort: 8079
          name: grpc
          protocol: TCP
        - containerPort: 8080
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /fortio/
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /fortio/
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: http-server
  namespace: grpc-benchmark
  labels:
    app: http-server
---
apiVersion: v1
kind: Service
metadata:
  name: http-server
  namespace: grpc-benchmark
  labels:
    app: http-server
    benchmark: mesh
spec:
  type: ClusterIP
  selector:
    app: http-server
  ports:
  - name: grpc
    port: 8079
    targetPort: 8079
    protocol: TCP
    appProtocol: grpc
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
---
# Istio DestinationRule for gRPC traffic policy
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: http-server
  namespace: grpc-benchmark
spec:
  host: http-server.grpc-benchmark.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 1000
      http:
        h2UpgradePolicy: UPGRADE
        http2MaxRequests: 1000
    loadBalancer:
      simple: LEAST_REQUEST
---
# Istio VirtualService for gRPC routing
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: http-server
  namespace: grpc-benchmark
spec:
  hosts:
  - http-server
  http:
  - route:
    - destination:
        host: http-server
        port:
          number: 8079
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: connect-failure,refused-stream,unavailable,cancelled,resource-exhausted
