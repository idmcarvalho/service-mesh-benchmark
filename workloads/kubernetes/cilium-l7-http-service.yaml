# Cilium L7 (Per-Node Envoy) HTTP Service for Sidecar vs Sidecarless Benchmark
# This workload uses CiliumNetworkPolicy with L7 HTTP rules to force Cilium's
# per-node Envoy proxy into the east-west datapath - true sidecarless L7 comparison
# Traffic path: client -> eBPF -> per-node Envoy (L7 inspect) -> backend
---
apiVersion: v1
kind: Namespace
metadata:
  name: cilium-l7
  labels:
    benchmark: cilium-l7
    workload-type: http
    istio-injection: disabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-server
  namespace: cilium-l7
  labels:
    app: http-server
    version: v1
    benchmark: cilium-l7
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-server
  template:
    metadata:
      labels:
        app: http-server
        version: v1
        benchmark: cilium-l7
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      nodeSelector:
        benchmark-role: server
      containers:
      - name: fortio
        image: fortio/fortio:latest
        args: ["server", "-http-port", "8080"]
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /fortio/
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /fortio/
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: http-server
  namespace: cilium-l7
  labels:
    app: http-server
    benchmark: cilium-l7
spec:
  type: ClusterIP
  selector:
    app: http-server
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
---
# CiliumNetworkPolicy with L7 HTTP rules
# This forces Cilium to redirect traffic through its per-node Envoy proxy
# for L7 HTTP inspection - the sidecarless equivalent of Istio's sidecar Envoy
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: http-server-l7
  namespace: cilium-l7
spec:
  endpointSelector:
    matchLabels:
      app: http-server
  ingress:
  - fromEndpoints:
    - {}
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
      rules:
        http:
        - method: GET
        - method: POST
        - method: HEAD
